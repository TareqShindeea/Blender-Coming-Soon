<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blender Design Studio — Dashboard</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 1px;
    }

    .logo span { color: #888; font-weight: 400; }

    .back-link {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color .2s;
    }
    .back-link:hover { color: #fff; }

    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 40px auto;
      padding: 0 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      color: #888;
      font-size: 15px;
      margin-bottom: 36px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a2a;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 15px;
      font-family: inherit;
      transition: border-color .2s;
      direction: ltr;
      text-align: left;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #555;
    }

    textarea { resize: vertical; min-height: 80px; }

    .input-hint {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }

    .btn-primary {
      background: #fff;
      color: #000;
    }
    .btn-primary:hover { background: #ddd; }
    .btn-primary:disabled {
      background: #444;
      color: #888;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: #aaa;
      border: 1px solid #333;
    }
    .btn-secondary:hover { border-color: #555; color: #fff; }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all .3s ease;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast-success { background: #1a3a1a; color: #4ade80; border: 1px solid #2a5a2a; }
    .toast-error { background: #3a1a1a; color: #f87171; border: 1px solid #5a2a2a; }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay.hidden { display: none; }

    .preview-section {
      margin-top: 12px;
    }

    .preview-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .preview-item {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .preview-label {
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .preview-value {
      font-size: 14px;
      color: #ccc;
      direction: ltr;
      text-align: left;
      word-break: break-all;
    }

    .preview-value.empty { color: #444; font-style: italic; }

    @media (max-width: 600px) {
      main { margin: 24px auto; }
      .card { padding: 20px; }
      .preview-grid { grid-template-columns: 1fr; }
      .btn-row { flex-direction: column; }
      .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">BLENDER <span>Dashboard</span></div>
    <a href="/" class="back-link">← العودة للصفحة الرئيسية</a>
  </header>

  <main>
    <h1>معلومات التواصل</h1>
    <p class="subtitle">إدارة بيانات التواصل المعروضة في الصفحة المؤقتة</p>

    <div class="card">
      <div class="card-title">بيانات التواصل الأساسية</div>

      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="info@example.com" />
      </div>

      <div class="form-group">
        <label for="phone">رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="+966 5x xxx xxxx" />
      </div>

      <div class="form-group">
        <label for="whatsapp">واتساب</label>
        <input type="tel" id="whatsapp" placeholder="+966 5x xxx xxxx" />
        <div class="input-hint">أدخل الرقم مع رمز الدولة</div>
      </div>

      <div class="form-group">
        <label for="address">العنوان</label>
        <textarea id="address" placeholder="المدينة، الدولة"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-title">حسابات التواصل الاجتماعي</div>

      <div class="form-group">
        <label for="instagram">Instagram</label>
        <input type="url" id="instagram" placeholder="https://instagram.com/username" />
      </div>

      <div class="form-group">
        <label for="twitter">X (Twitter)</label>
        <input type="url" id="twitter" placeholder="https://x.com/username" />
      </div>

      <div class="form-group">
        <label for="linkedin">LinkedIn</label>
        <input type="url" id="linkedin" placeholder="https://linkedin.com/company/name" />
      </div>
    </div>

    <div class="card">
      <div class="card-title">المعاينة</div>
      <div class="preview-section">
        <div class="preview-grid" id="previewGrid"></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="saveBtn" onclick="saveData()">حفظ التغييرات</button>
      <button class="btn btn-secondary" onclick="loadData()">إعادة تحميل</button>
    </div>
  </main>

  <div class="loading-overlay hidden" id="loading">
    <div class="spinner"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const fields = ['email', 'phone', 'whatsapp', 'instagram', 'twitter', 'linkedin', 'address'];
    const fieldLabels = {
      email: 'البريد الإلكتروني',
      phone: 'الهاتف',
      whatsapp: 'واتساب',
      instagram: 'Instagram',
      twitter: 'X (Twitter)',
      linkedin: 'LinkedIn',
      address: 'العنوان'
    };

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('hidden', !show);
    }

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast toast-' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function updatePreview() {
      const grid = document.getElementById('previewGrid');
      grid.innerHTML = fields.map(f => {
        const val = document.getElementById(f).value.trim();
        return '<div class="preview-item">' +
          '<div class="preview-label">' + fieldLabels[f] + '</div>' +
          '<div class="preview-value ' + (val ? '' : 'empty') + '">' +
            (val || 'غير محدد') +
          '</div></div>';
      }).join('');
    }

    async function loadData() {
      showLoading(true);
      try {
        const res = await fetch('/api/contact-info');
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        fields.forEach(f => {
          document.getElementById(f).value = data[f] || '';
        });
        updatePreview();
      } catch (err) {
        showToast('خطأ في تحميل البيانات', 'error');
      }
      showLoading(false);
    }

    async function saveData() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      showLoading(true);
      try {
        const body = {};
        fields.forEach(f => {
          body[f] = document.getElementById(f).value.trim();
        });
        const res = await fetch('/api/contact-info', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('Failed to save');
        showToast('تم الحفظ بنجاح', 'success');
        updatePreview();
      } catch (err) {
        showToast('خطأ في حفظ البيانات', 'error');
      }
      btn.disabled = false;
      showLoading(false);
    }

    fields.forEach(f => {
      document.getElementById(f).addEventListener('input', updatePreview);
    });

    loadData();
  </script>
</body>
</html>
