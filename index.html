    /* ── Shell ── */
    #main {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      height: 100%;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.2s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ── Header ── */
    header {
      padding: clamp(28px, 4.5vw, 52px) clamp(28px, 7vw, 80px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: slideUp 0.6s ease 0.5s forwards;
    }
    .logo-img {
      height: clamp(28px, 3.5vw, 42px);
      width: auto;
      display: block;
      object-fit: contain;
      object-position: left center;
    }
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .header-domain {
      font-size: clamp(8px, 0.75vw, 10px);
      letter-spacing: 0.28em;
      text-transform: lowercase;
      color: #999;
    }
    .header-divider {
      width: 32px;
      height: 1px;
      background: #ccc;
    }

    /* ── Hero ── */
    main {
      display: flex;
      align-items: center;
      padding: 0 clamp(28px, 7vw, 80px);
      position: relative;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 55%;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: clamp(20px, 3.5vh, 38px);
      opacity: 0;
      animation: slideUp 0.6s ease 0.9s forwards;
    }
    .eyebrow-line {
      width: 28px;
      height: 1px;
      background: #000;
      flex-shrink: 0;
    }
    .eyebrow-text {
      font-size: clamp(8px, 0.85vw, 10px);
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: #666;
    }

    h1 {
      font-weight: 700;
      font-size: clamp(52px, 9.5vw, 118px);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 0.88;
      color: #111;
      opacity: 0;
      animation: slideUp 0.7s ease 1.1s forwards;
    }
    h1 .thin-line {
      display: block;
      font-weight: 300;
      color: #555;
      font-size: 0.78em;
      letter-spacing: 0.08em;
    }

    /* The signature underline animation */
    .bar-wrap {
      margin-top: clamp(12px, 2vh, 22px);
      opacity: 0;
      animation: slideUp 0.5s ease 1.6s forwards;
    }
    .bar {
      height: 6px;
      background: #111;
      width: 0;
      animation: barGrow 1s ease 1.9s forwards;
    }
    @keyframes barGrow { to { width: 100%; } }

    .tagline {
      margin-top: clamp(22px, 4vh, 42px);
      font-size: clamp(9px, 1vw, 12px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #777;
      line-height: 2.2;
      opacity: 0;
      animation: slideUp 0.6s ease 1.7s forwards;
    }

    /* ── Footer ── */
    footer {
      padding: clamp(20px, 3vh, 36px) clamp(28px, 7vw, 80px);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-top: 1px solid rgba(0,0,0,0.1);
      opacity: 0;
      animation: slideUp 0.6s ease 2.1s forwards;
    }
    .footer-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .col-label {
      font-size: clamp(7px, 0.7vw, 9px);
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: #aaa;
    }
    .col-value {
      font-size: clamp(9px, 0.9vw, 11px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #222;
    }
    .col-link {
      font-size: clamp(9px, 0.9vw, 11px);
      letter-spacing: 0.1em;
      color: #222;
      text-decoration: none;
      transition: color 0.35s;
    }
    .col-link:hover { color: #888; }

    /* ── Animations ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      html, body { overflow: auto; }
      .hero-content { max-width: 100%; }
      footer { flex-direction: column; gap: 18px; align-items: flex-start; }
    }
  </style>
</head>

      (async function() {
        try {
          var res = await fetch('/api/contact-info');

            var el = document.getElementById('contact-email');
